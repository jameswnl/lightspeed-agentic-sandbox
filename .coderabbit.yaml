# CodeRabbit configuration — lightspeed-agentic-sandbox
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit
reviews:
  # Profile: "chill" generates fewer comments, focuses on significant issues
  profile: chill

  # Auto-review settings
  auto_review:
    enabled: true
    base_branches:
      - 'main'
    drafts: false
    ignore_title_keywords:
      - 'WIP'
      - 'DO NOT MERGE'

  # File/path filters — skip generated, lockfiles, and mechanical artifacts
  path_filters:
    # Python dependency locks (regenerate via `make lock` / `make requirements`)
    - '!uv.lock'
    - '!requirements.x86_64.txt'
    - '!requirements.aarch64.txt'
    - '!requirements-build.txt'
    # RPM lockfile for Konflux hermetic builds (`make rpm-lockfile`)
    - '!rpms.lock.yaml'
    # npm lock for claude-code CLI in the container image
    - '!package-lock.json'
    # External binary checksum manifest for Containerfile
    - '!artifacts.lock.yaml'
    # Eval output (generated by `make eval-report`)
    - '!evals/report.json'
    # Local IDE metadata (should not be committed; exclude if present)
    - '!.idea/**'

  # Review behavior
  collapse_walkthrough: true
  poem: false
  high_level_summary: true
  review_status: true
  commit_status: true

  # Sequence diagrams for complex logic (chill profile limits these to significant changes)
  sequence_diagrams: true

chat:
  auto_reply: false
